<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --danger-color: #ef4444;
            --warning-color: #eab308;
            --success-color: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 1.75rem;
            text-align: center;
            color: var(--text-primary);
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 160px;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            transition: outline 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            letter-spacing: 0.025em;
        }

        button:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .output-section {
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            min-height: 80px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .output-section.active {
            color: var(--text-primary);
            border-color: rgba(59, 130, 246, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .api-key-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
            width: 100%;
        }

        .api-key-input {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            width: 250px;
            transition: all 0.2s ease;
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .task-card {
            background: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.2s ease;
        }

        .task-card:hover {
            transform: translateY(-1px);
        }

        .risk-high {
            border-left-color: var(--danger-color);
        }

        .risk-medium {
            border-left-color: var(--warning-color);
        }

        .risk-low {
            border-left-color: var(--success-color);
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .task-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.05rem;
        }

        .task-risk {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .risk-badge-high {
            background-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .risk-badge-medium {
            background-color: rgba(234, 179, 8, 0.2);
            color: #fde047;
        }

        .risk-badge-low {
            background-color: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .task-reason {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .task-action {
            margin-top: 0.25rem;
            font-weight: 600;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .task-action:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .task-action::before {
            content: "→";
            margin-right: 8px;
            font-size: 1.1em;
        }

        .top-risk-alert {
            background-color: var(--danger-color);
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            font-size: 1.15rem;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="riskAlert" class="top-risk-alert">⚠️ HIGH RISK TASK — START NOW</div>
        <div class="api-key-container">
            <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Google Gemini API Key">
        </div>
        <h1>Task Analyzer</h1>

        <div class="input-group">
            <textarea id="taskInput" placeholder="Paste your tasks or brain dump here..."></textarea>
            <button id="analyzeBtn">Analyze Tasks</button>
        </div>

        <div id="outputDisplay" class="output-section">
            Results will appear here...
        </div>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const taskInput = document.getElementById('taskInput');
        const outputDisplay = document.getElementById('outputDisplay');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // Load API key from local storage
        if (localStorage.getItem('geminiApiKey')) {
            apiKeyInput.value = localStorage.getItem('geminiApiKey');
        }

        apiKeyInput.addEventListener('change', (e) => {
            localStorage.setItem('geminiApiKey', e.target.value.trim());
        });

        analyzeBtn.addEventListener('click', async () => {
            document.getElementById('riskAlert').style.display = 'none';

            const text = taskInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                outputDisplay.classList.add('active');
                outputDisplay.innerHTML = `<div style="color: var(--danger-color); padding: 1rem; width: 100%; text-align: center;">Please enter your Gemini API Key at the top right.</div>`;
                return;
            }

            if (!text) {
                outputDisplay.textContent = "Please enter some text to analyze.";
                outputDisplay.classList.remove('active');
                return;
            }

            outputDisplay.classList.add('active');
            outputDisplay.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; width: 100%; padding: 1.5rem;">
                    <div class="loader"></div> <span style="color: var(--text-primary); font-weight: 500;">Analyzing tasks with Gemini...</span>
                </div>
            `;
            analyzeBtn.disabled = true;
            analyzeBtn.style.opacity = '0.7';
            analyzeBtn.style.cursor = 'not-allowed';

            try {
                // Use a stable model
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: "user",
                            parts: [{
                                text: `Analyze the following tasks/text. For each distinct task identified, provide: 1. A short title. 2. A risk level (LOW, MEDIUM, HIGH) representing urgency or importance. 3. A brief reason for the risk level. 4. A strict action to take (e.g. 'Start now', 'Schedule for later'). 
Return the result strictly as a valid JSON array of objects with the following keys: 'title', 'risk', 'reason', 'action'. Do not return any other text, no markdown block wrap.
Text to analyze:
${text}`
                            }]
                        }],
                        generationConfig: {
                            responseMimeType: "application/json",
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                let results = [];
                try {
                    const rawText = data.candidates[0].content.parts[0].text;
                    results = JSON.parse(rawText);
                } catch (e) {
                    throw new Error("Failed to parse Gemini response as JSON.");
                }

                if (!Array.isArray(results) || results.length === 0) {
                    outputDisplay.innerHTML = `<div style="padding: 1rem; width: 100%; text-align: center;">No explicit tasks could be identified.</div>`;
                    return;
                }

                let html = '<div class="results-container">';
                results.forEach(task => {
                    const risk = (task.risk || 'LOW').toUpperCase();
                    const riskClass = risk === 'HIGH' ? 'risk-high' : (risk === 'MEDIUM' ? 'risk-medium' : 'risk-low');
                    const badgeClass = risk === 'HIGH' ? 'risk-badge-high' : (risk === 'MEDIUM' ? 'risk-badge-medium' : 'risk-badge-low');

                    html += `
                        <div class="task-card ${riskClass}">
                            <div class="task-card-header">
                                <div class="task-title">${task.title || 'Task'}</div>
                                <div class="task-risk ${badgeClass}">${risk}</div>
                            </div>
                            <div class="task-reason">${task.reason || ''}</div>
                            <div class="task-action">${task.action || ''}</div>
                        </div>
                    `;
                });
                html += '</div>';

                outputDisplay.innerHTML = html;

                let hasHigh = false;
                results.forEach(task => {
                    const risk = (task.risk || 'LOW').toUpperCase();
                    if (risk === 'HIGH') {
                        hasHigh = true;
                    }
                });

                if (hasHigh) {
                    document.getElementById('riskAlert').style.display = 'block';
                }

                const actionButtons = outputDisplay.querySelectorAll('.task-action');
                actionButtons.forEach(btn => {
                    btn.title = "Click to schedule and plan this task";
                    btn.addEventListener('click', () => {
                        const hours = window.prompt("How many hours can you spend?");
                        if (hours === null || hours.trim() === '') return;

                        const start = window.prompt("When do you want to start?");
                        if (start === null || start.trim() === '') return;

                        let planContainer = btn.nextElementSibling;
                        if (!planContainer || !planContainer.classList.contains('plan-details')) {
                            planContainer = document.createElement('div');
                            planContainer.className = 'plan-details';
                            planContainer.style.marginTop = '0.75rem';
                            planContainer.style.padding = '1rem';
                            planContainer.style.backgroundColor = 'rgba(0,0,0,0.15)';
                            planContainer.style.borderLeft = '2px dashed var(--accent-color)';
                            planContainer.style.borderRadius = '4px';
                            btn.parentNode.appendChild(planContainer);
                        }

                        const h = parseFloat(hours) || 1;
                        const daysNum = Math.min(Math.ceil(h / 2), 5) || 1;

                        let listHtml = '';
                        if (daysNum <= 1) {
                            listHtml = `<li style="margin-bottom: 0.25rem;"><strong>Phase 1:</strong> Complete in one focused session (${h} hrs)</li>`;
                        } else {
                            listHtml += `<li style="margin-bottom: 0.25rem;"><strong>Day 1:</strong> Research</li>`;
                            for (let i = 2; i < daysNum; i++) {
                                listHtml += `<li style="margin-bottom: 0.25rem;"><strong>Day ${i}:</strong> Work</li>`;
                            }
                            listHtml += `<li><strong>Day ${daysNum}:</strong> Finalize</li>`;
                        }

                        planContainer.innerHTML = `
                            <strong style="color: var(--text-primary); font-size: 0.95rem;">Action Plan (Start: ${start}):</strong>
                            <ul style="margin: 0.75rem 0 0 0; padding-left: 1.25rem; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;">
                                ${listHtml}
                            </ul>
                        `;
                    });
                });

            } catch (err) {
                outputDisplay.innerHTML = `<div style="color: var(--warning-color); padding: 1rem; width: 100%; text-align: center; font-weight: 600;">⚠️ AI temporarily unavailable, please try again later</div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.style.opacity = '1';
                analyzeBtn.style.cursor = 'pointer';
            }
        });
    </script>
</body>

</html>
